<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="220" height="130" viewBox="0 0 220 130">
  <!-- ===== straight flight (plan view) ===== -->
  <rect x="86" y="26" width="48" height="84" fill="#eaf2ff" stroke="#1a5fb4" stroke-width="2"/>
  <g stroke="#1a5fb4" stroke-width="1.2">
    <line x1="86" y1="36" x2="134" y2="36"/>
    <line x1="86" y1="46" x2="134" y2="46"/>
    <line x1="86" y1="56" x2="134" y2="56"/>
    <line x1="86" y1="66" x2="134" y2="66"/>
    <line x1="86" y1="76" x2="134" y2="76"/>
    <line x1="86" y1="86" x2="134" y2="86"/>
    <line x1="86" y1="96" x2="134" y2="96"/>
  </g>
  <!-- ascent arrow -->
  <g stroke="#e66100" stroke-width="2" fill="#e66100">
    <line x1="110" y1="106" x2="110" y2="38"/>
    <polygon points="110,30 105,42 115,42"/>
  </g>
  <!-- W (across) -->
  <g stroke="#666666" stroke-width="1">
    <line x1="86" y1="16" x2="134" y2="16"/>
    <line x1="86" y1="13" x2="86" y2="19"/>
    <line x1="134" y1="13" x2="134" y2="19"/>
  </g>
  <!-- L (along) -->
  <g stroke="#666666" stroke-width="1">
    <line x1="74" y1="26" x2="74" y2="110"/>
    <line x1="71" y1="26" x2="77" y2="26"/>
    <line x1="71" y1="110" x2="77" y2="110"/>
  </g>
  <g font-family="sans-serif" font-size="13" font-weight="bold" fill="#c01c28">
    <text x="104" y="13">W</text>
    <text x="62" y="72">L</text>
  </g>
  <!-- legend -->
  <text x="10" y="126" font-family="sans-serif" font-size="10" fill="#333333">W width · L run length · H total rise</text>
</svg>
