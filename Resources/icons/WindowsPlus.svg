<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- outer frame, 4-sided -->
  <g fill="none" stroke="#1a5fb4" stroke-width="3" stroke-linejoin="round">
    <rect x="14" y="8" width="36" height="48" rx="1" fill="#cfe3ff"/>
  </g>
  <!-- glazed opening -->
  <rect x="19" y="13" width="26" height="38" fill="#e8f4ff" stroke="#1a5fb4" stroke-width="1.5"/>
  <!-- four panes: cross mullion (|+|) -->
  <g stroke="#2ec27e" stroke-width="3" stroke-linecap="round">
    <line x1="32" y1="13" x2="32" y2="51"/>
    <line x1="19" y1="32" x2="45" y2="32"/>
  </g>
</svg>
