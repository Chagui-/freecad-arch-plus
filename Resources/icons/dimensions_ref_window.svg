<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="220" height="140" viewBox="0 0 220 140">
  <!-- ===== Elevation (front view): W, H, Fw ===== -->
  <!-- outer frame (4-sided: left, right, top, AND bottom) -->
  <rect x="44" y="24" width="64" height="84" fill="#eaf2ff" stroke="#1a5fb4" stroke-width="2"/>
  <!-- inner opening (frame on all 4 sides) -->
  <rect x="51" y="31" width="50" height="70" fill="#ffffff" stroke="#1a5fb4" stroke-width="1.2"/>
  <!-- sash indication (hinge at left) -->
  <line x1="51" y1="101" x2="101" y2="31" stroke="#9aa7b5" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="51" cy="66" r="2" fill="#1a5fb4"/>
  <!-- glass tint -->
  <rect x="52" y="32" width="48" height="68" fill="#e8f4ff" stroke="none" opacity="0.5"/>

  <!-- W (across, top) -->
  <g stroke="#666666" stroke-width="1">
    <line x1="44" y1="16" x2="108" y2="16"/>
    <line x1="44" y1="13" x2="44" y2="19"/>
    <line x1="108" y1="13" x2="108" y2="19"/>
  </g>
  <!-- H (down, left) -->
  <g stroke="#666666" stroke-width="1">
    <line x1="34" y1="24" x2="34" y2="108"/>
    <line x1="31" y1="24" x2="37" y2="24"/>
    <line x1="31" y1="108" x2="37" y2="108"/>
  </g>
  <!-- Fw (left jamb width) -->
  <g stroke="#666666" stroke-width="1">
    <line x1="44" y1="60" x2="51" y2="60"/>
    <line x1="44" y1="57" x2="44" y2="63"/>
    <line x1="51" y1="57" x2="51" y2="63"/>
  </g>

  <!-- ===== Plan section (top view): Fd, Sd ===== -->
  <!-- wall stubs -->
  <g stroke="#9aa7b5" stroke-width="1.2">
    <line x1="144" y1="44" x2="150" y2="44"/>
    <line x1="144" y1="74" x2="150" y2="74"/>
    <line x1="204" y1="44" x2="210" y2="44"/>
    <line x1="204" y1="74" x2="210" y2="74"/>
  </g>
  <!-- frame jambs in section -->
  <rect x="150" y="44" width="8" height="30" fill="#eaf2ff" stroke="#1a5fb4" stroke-width="2"/>
  <rect x="196" y="44" width="8" height="30" fill="#eaf2ff" stroke="#1a5fb4" stroke-width="2"/>
  <!-- sash (closed) with glass, flush to the front (interior) face -->
  <rect x="158" y="44" width="38" height="12" fill="#e8f4ff" stroke="#1a5fb4" stroke-width="1.5"/>

  <!-- Fd (frame depth) & Sd (sash depth) dimensioned on the left. Both share
       the front (interior) face, so Sd is clearly measured from that face and
       is the front portion of the frame depth. Gray lines are face witnesses. -->
  <g stroke-width="1">
    <g stroke="#cccccc">
      <line x1="114" y1="44" x2="150" y2="44"/>   <!-- front (interior) face -->
      <line x1="114" y1="74" x2="150" y2="74"/>   <!-- frame back face -->
      <line x1="132" y1="56" x2="158" y2="56"/>   <!-- sash back face -->
    </g>
    <g stroke="#666666">
      <!-- Fd: full frame depth (gap left for the label) -->
      <line x1="120" y1="44" x2="120" y2="55"/>
      <line x1="120" y1="64" x2="120" y2="74"/>
      <line x1="117" y1="44" x2="123" y2="44"/>
      <line x1="117" y1="74" x2="123" y2="74"/>
      <!-- Sd: sash depth, front portion, short leader down to its label -->
      <line x1="138" y1="44" x2="138" y2="56"/>
      <line x1="135" y1="44" x2="141" y2="44"/>
      <line x1="135" y1="56" x2="141" y2="56"/>
      <line x1="138" y1="56" x2="138" y2="64"/>
    </g>
  </g>

  <!-- ===== labels ===== -->
  <g font-family="sans-serif" font-weight="bold" fill="#c01c28">
    <text x="76" y="13" font-size="13" text-anchor="middle">W</text>
    <text x="26" y="70" font-size="13" text-anchor="middle">H</text>
    <text x="47" y="73" font-size="10" text-anchor="middle">Fw</text>
    <text x="120" y="62" font-size="11" text-anchor="middle">Fd</text>
    <text x="138" y="72" font-size="11" text-anchor="middle">Sd</text>
  </g>

  <!-- legend (two lines) -->
  <g font-family="sans-serif" font-size="9" fill="#333333">
    <text x="8" y="122">W·H overall · Fw jamb · Fd frame depth</text>
    <text x="8" y="133">Sd sash depth (from interior face) · sill above floor</text>
  </g>
</svg>
