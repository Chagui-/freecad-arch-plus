<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <g fill="none" stroke="#1a5fb4" stroke-width="3" stroke-linejoin="round">
    <!-- door slab, hinged at the floor line -->
    <rect x="16" y="6" width="32" height="52" rx="1" fill="#cfe3ff"/>
  </g>
  <g fill="none" stroke="#2ec27e" stroke-width="3" stroke-linejoin="round">
    <!-- recessed panels -->
    <rect x="23" y="13" width="18" height="16"/>
    <rect x="23" y="35" width="18" height="16"/>
  </g>
  <!-- handle, in the stile between panel edge and door edge -->
  <circle cx="44" cy="32" r="2" fill="#1a5fb4"/>
</svg>
