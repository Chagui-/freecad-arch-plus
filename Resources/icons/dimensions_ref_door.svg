<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="220" height="130" viewBox="0 0 220 130">
  <!-- ===== Elevation (front view): W, H, Fw ===== -->
  <!-- outer frame -->
  <rect x="44" y="24" width="64" height="84" fill="#eaf2ff" stroke="#1a5fb4" stroke-width="2"/>
  <!-- inner opening (frame on sides + top, flush at floor) -->
  <rect x="51" y="31" width="50" height="77" fill="#ffffff" stroke="#1a5fb4" stroke-width="1.2"/>
  <!-- door-leaf indication (hinge at bottom-left) -->
  <line x1="51" y1="108" x2="101" y2="31" stroke="#9aa7b5" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="51" cy="108" r="2" fill="#1a5fb4"/>

  <!-- W (across, top) -->
  <g stroke="#666666" stroke-width="1">
    <line x1="44" y1="16" x2="108" y2="16"/>
    <line x1="44" y1="13" x2="44" y2="19"/>
    <line x1="108" y1="13" x2="108" y2="19"/>
  </g>
  <!-- H (down, left) -->
  <g stroke="#666666" stroke-width="1">
    <line x1="34" y1="24" x2="34" y2="108"/>
    <line x1="31" y1="24" x2="37" y2="24"/>
    <line x1="31" y1="108" x2="37" y2="108"/>
  </g>
  <!-- Fw (left jamb width) -->
  <g stroke="#666666" stroke-width="1">
    <line x1="44" y1="92" x2="51" y2="92"/>
    <line x1="44" y1="89" x2="44" y2="95"/>
    <line x1="51" y1="89" x2="51" y2="95"/>
  </g>

  <!-- ===== Plan section (top view): Fd, Pt ===== -->
  <!-- wall stubs -->
  <g stroke="#9aa7b5" stroke-width="1.2">
    <line x1="144" y1="44" x2="150" y2="44"/>
    <line x1="144" y1="74" x2="150" y2="74"/>
    <line x1="204" y1="44" x2="210" y2="44"/>
    <line x1="204" y1="74" x2="210" y2="74"/>
  </g>
  <!-- frame jambs in section -->
  <rect x="150" y="44" width="8" height="30" fill="#eaf2ff" stroke="#1a5fb4" stroke-width="2"/>
  <rect x="196" y="44" width="8" height="30" fill="#eaf2ff" stroke="#1a5fb4" stroke-width="2"/>
  <!-- door leaf (closed) -->
  <rect x="158" y="55" width="38" height="8" fill="#ffffff" stroke="#1a5fb4" stroke-width="1.5"/>

  <!-- Fd (frame depth, left) -->
  <g stroke="#666666" stroke-width="1">
    <line x1="138" y1="44" x2="138" y2="74"/>
    <line x1="135" y1="44" x2="141" y2="44"/>
    <line x1="135" y1="74" x2="141" y2="74"/>
  </g>
  <!-- Pt (panel thickness, with leader) -->
  <g stroke="#666666" stroke-width="1">
    <line x1="172" y1="55" x2="172" y2="63"/>
    <line x1="169" y1="55" x2="175" y2="55"/>
    <line x1="169" y1="63" x2="175" y2="63"/>
    <line x1="172" y1="63" x2="172" y2="80"/>
  </g>

  <!-- ===== labels ===== -->
  <g font-family="sans-serif" font-weight="bold" fill="#c01c28">
    <text x="76" y="13" font-size="13" text-anchor="middle">W</text>
    <text x="26" y="70" font-size="13" text-anchor="middle">H</text>
    <text x="47" y="105" font-size="10" text-anchor="middle">Fw</text>
    <text x="130" y="62" font-size="11" text-anchor="middle">Fd</text>
    <text x="172" y="90" font-size="11" text-anchor="middle">Pt</text>
  </g>

  <!-- legend -->
  <text x="10" y="126" font-family="sans-serif" font-size="10" fill="#333333">W·H overall · Fw frame · Pt panel · Fd depth</text>
</svg>
