<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="220" height="130" viewBox="0 0 220 130">
  <!-- ===== straight flight (plan view) ===== -->
  <rect x="32" y="22" width="46" height="84" fill="#eaf2ff" stroke="#1a5fb4" stroke-width="2"/>
  <g stroke="#1a5fb4" stroke-width="1.2">
    <line x1="32" y1="32" x2="78" y2="32"/>
    <line x1="32" y1="42" x2="78" y2="42"/>
    <line x1="32" y1="52" x2="78" y2="52"/>
    <line x1="32" y1="62" x2="78" y2="62"/>
    <line x1="32" y1="72" x2="78" y2="72"/>
    <line x1="32" y1="82" x2="78" y2="82"/>
    <line x1="32" y1="92" x2="78" y2="92"/>
  </g>
  <!-- ascent arrow -->
  <g stroke="#e66100" stroke-width="2" fill="#e66100">
    <line x1="55" y1="102" x2="55" y2="34"/>
    <polygon points="55,26 50,38 60,38"/>
  </g>
  <!-- W (across) and L (along) -->
  <g stroke="#666666" stroke-width="1">
    <line x1="32" y1="14" x2="78" y2="14"/>
    <line x1="32" y1="11" x2="32" y2="17"/>
    <line x1="78" y1="11" x2="78" y2="17"/>
    <line x1="22" y1="22" x2="22" y2="106"/>
    <line x1="19" y1="22" x2="25" y2="22"/>
    <line x1="19" y1="106" x2="25" y2="106"/>
  </g>
  <g font-family="sans-serif" font-size="13" font-weight="bold" fill="#c01c28">
    <text x="51" y="11">W</text>
    <text x="10" y="68">L</text>
  </g>

  <!-- ===== half-turn (plan view): width is ONE flight ===== -->
  <rect x="120" y="50" width="30" height="56" fill="#eaf2ff" stroke="#1a5fb4" stroke-width="2"/>
  <rect x="155" y="50" width="30" height="56" fill="#eaf2ff" stroke="#1a5fb4" stroke-width="2"/>
  <rect x="120" y="28" width="65" height="22" fill="#cfe3ff" stroke="#1a5fb4" stroke-width="2"/>
  <g stroke="#1a5fb4" stroke-width="1">
    <line x1="120" y1="60" x2="150" y2="60"/>
    <line x1="120" y1="70" x2="150" y2="70"/>
    <line x1="120" y1="80" x2="150" y2="80"/>
    <line x1="120" y1="90" x2="150" y2="90"/>
    <line x1="155" y1="60" x2="185" y2="60"/>
    <line x1="155" y1="70" x2="185" y2="70"/>
    <line x1="155" y1="80" x2="185" y2="80"/>
    <line x1="155" y1="90" x2="185" y2="90"/>
  </g>
  <!-- W on a single flight -->
  <g stroke="#666666" stroke-width="1">
    <line x1="120" y1="113" x2="150" y2="113"/>
    <line x1="120" y1="110" x2="120" y2="116"/>
    <line x1="150" y1="110" x2="150" y2="116"/>
  </g>
  <text x="130" y="111" font-family="sans-serif" font-size="13" font-weight="bold" fill="#c01c28">W</text>

  <!-- legend -->
  <text x="10" y="126" font-family="sans-serif" font-size="10" fill="#333333">W width (per flight) · L run length · H total rise (height climbed)</text>
</svg>
